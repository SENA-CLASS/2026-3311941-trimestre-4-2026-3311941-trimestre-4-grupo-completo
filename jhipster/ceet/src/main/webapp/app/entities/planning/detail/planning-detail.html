<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (planning(); as planningRef) {
      <div>
        <h2 data-cy="planningDetailsHeading"><span ceetTranslate="ceetApp.planning.detail.title">Planning</span></h2>

        <hr />

        <ceet-alert-error />

        <ceet-alert />

        <dl class="row-md jh-entity-details">
          <dt><span ceetTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ planningRef.id }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.planning.planningCode">Planning Code</span></dt>
          <dd>
            <span>{{ planningRef.planningCode }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.planning.planningDate">Planning Date</span></dt>
          <dd>
            <span>{{ planningRef.planningDate | formatMediumDatetime }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.planning.planningState">Planning State</span></dt>
          <dd>
            <span [ceetTranslate]="'ceetApp.State.' + (planningRef.planningState ?? 'null')">{{
              { null: '', ACTIVE: 'Activo', INACTIVE: 'Inactivo' }[planningRef.planningState ?? 'null']
            }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span ceetTranslate="entity.action.back">Volver</span>
        </button>

        <button type="button" [routerLink]="['/planning', planningRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span ceetTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
