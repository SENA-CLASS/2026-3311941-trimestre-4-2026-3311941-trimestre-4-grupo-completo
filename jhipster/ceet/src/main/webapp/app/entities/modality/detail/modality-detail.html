<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (modality(); as modalityRef) {
      <div>
        <h2 data-cy="modalityDetailsHeading"><span ceetTranslate="ceetApp.modality.detail.title">Modality</span></h2>

        <hr />

        <ceet-alert-error />

        <ceet-alert />

        <dl class="row-md jh-entity-details">
          <dt><span ceetTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ modalityRef.id }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.modality.modalityName">Modality Name</span></dt>
          <dd>
            <span>{{ modalityRef.modalityName }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.modality.modalityColor">Modality Color</span></dt>
          <dd>
            <span>{{ modalityRef.modalityColor }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.modality.modalityState">Modality State</span></dt>
          <dd>
            <span [ceetTranslate]="'ceetApp.State.' + (modalityRef.modalityState ?? 'null')">{{
              { null: '', ACTIVE: 'Activo', INACTIVE: 'Inactivo' }[modalityRef.modalityState ?? 'null']
            }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span ceetTranslate="entity.action.back">Volver</span>
        </button>

        <button type="button" [routerLink]="['/modality', modalityRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span ceetTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
