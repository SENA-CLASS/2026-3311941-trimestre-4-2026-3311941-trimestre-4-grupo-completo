<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (bonding(); as bondingRef) {
      <div>
        <h2 data-cy="bondingDetailsHeading"><span ceetTranslate="ceetApp.bonding.detail.title">Bonding</span></h2>

        <hr />

        <ceet-alert-error />

        <ceet-alert />

        <dl class="row-md jh-entity-details">
          <dt><span ceetTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ bondingRef.id }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.bonding.bondingType">Bonding Type</span></dt>
          <dd>
            <span>{{ bondingRef.bondingType }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.bonding.workingHours">Working Hours</span></dt>
          <dd>
            <span>{{ bondingRef.workingHours }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.bonding.bondingState">Bonding State</span></dt>
          <dd>
            <span [ceetTranslate]="'ceetApp.State.' + (bondingRef.bondingState ?? 'null')">{{
              { null: '', ACTIVE: 'Activo', INACTIVE: 'Inactivo' }[bondingRef.bondingState ?? 'null']
            }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span ceetTranslate="entity.action.back">Volver</span>
        </button>

        <button type="button" [routerLink]="['/bonding', bondingRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span ceetTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
