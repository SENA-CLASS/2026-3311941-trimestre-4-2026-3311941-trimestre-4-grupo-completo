<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (trainingStatus(); as trainingStatusRef) {
      <div>
        <h2 data-cy="trainingStatusDetailsHeading"><span ceetTranslate="ceetApp.trainingStatus.detail.title">Training Status</span></h2>

        <hr />

        <ceet-alert-error />

        <ceet-alert />

        <dl class="row-md jh-entity-details">
          <dt><span ceetTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ trainingStatusRef.id }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.trainingStatus.statusName">Status Name</span></dt>
          <dd>
            <span>{{ trainingStatusRef.statusName }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.trainingStatus.stateTraining">State Training</span></dt>
          <dd>
            <span [ceetTranslate]="'ceetApp.State.' + (trainingStatusRef.stateTraining ?? 'null')">{{
              { null: '', ACTIVE: 'Activo', INACTIVE: 'Inactivo' }[trainingStatusRef.stateTraining ?? 'null']
            }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span ceetTranslate="entity.action.back">Volver</span>
        </button>

        <button type="button" [routerLink]="['/training-status', trainingStatusRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span ceetTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
