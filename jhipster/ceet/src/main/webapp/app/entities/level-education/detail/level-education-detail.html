<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (levelEducation(); as levelEducationRef) {
      <div>
        <h2 data-cy="levelEducationDetailsHeading"><span ceetTranslate="ceetApp.levelEducation.detail.title">Level Education</span></h2>

        <hr />

        <ceet-alert-error />

        <ceet-alert />

        <dl class="row-md jh-entity-details">
          <dt><span ceetTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ levelEducationRef.id }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.levelEducation.levelName">Level Name</span></dt>
          <dd>
            <span>{{ levelEducationRef.levelName }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.levelEducation.stateLevelEducation">State Level Education</span></dt>
          <dd>
            <span [ceetTranslate]="'ceetApp.State.' + (levelEducationRef.stateLevelEducation ?? 'null')">{{
              { null: '', ACTIVE: 'Activo', INACTIVE: 'Inactivo' }[levelEducationRef.stateLevelEducation ?? 'null']
            }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span ceetTranslate="entity.action.back">Volver</span>
        </button>

        <button type="button" [routerLink]="['/level-education', levelEducationRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span ceetTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
