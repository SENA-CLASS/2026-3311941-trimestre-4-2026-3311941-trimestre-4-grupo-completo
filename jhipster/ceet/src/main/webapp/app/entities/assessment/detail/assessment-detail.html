<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (assessment(); as assessmentRef) {
      <div>
        <h2 data-cy="assessmentDetailsHeading"><span ceetTranslate="ceetApp.assessment.detail.title">Assessment</span></h2>

        <hr />

        <ceet-alert-error />

        <ceet-alert />

        <dl class="row-md jh-entity-details">
          <dt><span ceetTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ assessmentRef.id }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.assessment.assessmentType">Assessment Type</span></dt>
          <dd>
            <span>{{ assessmentRef.assessmentType }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.assessment.assessmentState">Assessment State</span></dt>
          <dd>
            <span [ceetTranslate]="'ceetApp.State.' + (assessmentRef.assessmentState ?? 'null')">{{
              { null: '', ACTIVE: 'Activo', INACTIVE: 'Inactivo' }[assessmentRef.assessmentState ?? 'null']
            }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span ceetTranslate="entity.action.back">Volver</span>
        </button>

        <button type="button" [routerLink]="['/assessment', assessmentRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span ceetTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
