@if (logAudit) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(logAudit.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="logAuditDeleteDialogHeading" ceetTranslate="entity.delete.title">Confirmar operación de borrado</h4>
    </div>

    <div class="modal-body">
      <ceet-alert-error />
      <p id="ceet-delete-logAudit-heading" ceetTranslate="ceetApp.logAudit.delete.question" [translateValues]="{ id: logAudit.id }">
        ¿Seguro que quiere eliminar Log Audit {{ logAudit.id }}?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban" />&nbsp;<span ceetTranslate="entity.action.cancel">Cancelar</span>
      </button>

      <button id="ceet-confirm-delete-logAudit" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times" />&nbsp;<span ceetTranslate="entity.action.delete">Eliminar</span>
      </button>
    </div>
  </form>
}
