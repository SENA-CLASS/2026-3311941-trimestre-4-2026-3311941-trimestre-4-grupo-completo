<div>
  <div class="d-flex justify-content-center">
    <div class="col-lg-6 col-md-8 col-sm-10">
      <h1 data-cy="loginTitle" ceetTranslate="login.title">Iniciar la sesión</h1>
      @if (authenticationError()) {
        <div class="alert alert-danger" data-cy="loginError" ceetTranslate="login.messages.error.authentication">
          <strong>¡El inicio de sesión ha fallado!</strong> Por favor, revise las credenciales e intente de nuevo.
        </div>
      }
      <form class="form" (ngSubmit)="login()" [formGroup]="loginForm">
        <div class="mb-3">
          <label class="username-label" for="username" ceetTranslate="global.form.username.label">Usuario</label>
          <input
            type="text"
            class="form-control"
            name="username"
            id="username"
            placeholder="{{ 'global.form.username.placeholder' | translate }}"
            formControlName="username"
            data-cy="username"
          />
        </div>

        <div class="mb-3">
          <label for="password" ceetTranslate="login.form.password">Contraseña</label>
          <input
            type="password"
            class="form-control"
            name="password"
            id="password"
            placeholder="{{ 'login.form.password.placeholder' | translate }}"
            formControlName="password"
            data-cy="password"
          />
        </div>

        <div class="form-check">
          <label class="form-check-label" for="rememberMe">
            <input class="form-check-input" type="checkbox" name="rememberMe" id="rememberMe" formControlName="rememberMe" />
            <span ceetTranslate="login.form.rememberme">Iniciar la sesión automáticamente</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary" data-cy="submit" ceetTranslate="login.form.button">Iniciar sesión</button>
      </form>
      <div class="mt-3 alert alert-warning">
        <a class="alert-link" routerLink="/account/reset/request" data-cy="forgetYourPasswordSelector" ceetTranslate="login.password.forgot"
          >¿Ha olvidado su contraseña?</a
        >
      </div>

      <div class="alert alert-warning">
        <span ceetTranslate="global.messages.info.register.noaccount">¿Aún no tienes una cuenta?</span>
        <a class="alert-link" routerLink="/account/register" ceetTranslate="global.messages.info.register.link">Crea una cuenta</a>
      </div>
    </div>
  </div>
</div>
