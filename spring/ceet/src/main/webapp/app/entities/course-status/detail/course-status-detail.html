<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (courseStatus(); as courseStatusRef) {
      <div>
        <h2 data-cy="courseStatusDetailsHeading"><span ceetTranslate="ceetApp.courseStatus.detail.title">Course Status</span></h2>

        <hr />

        <ceet-alert-error />

        <ceet-alert />

        <dl class="row-md jh-entity-details">
          <dt><span ceetTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ courseStatusRef.id }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.courseStatus.nameCourseStatus">Name Course Status</span></dt>
          <dd>
            <span>{{ courseStatusRef.nameCourseStatus }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.courseStatus.stateCourse">State Course</span></dt>
          <dd>
            <span [ceetTranslate]="'ceetApp.State.' + (courseStatusRef.stateCourse ?? 'null')">{{
              { null: '', ACTIVE: 'Activo', INACTIVE: 'Inactivo' }[courseStatusRef.stateCourse ?? 'null']
            }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span ceetTranslate="entity.action.back">Volver</span>
        </button>

        <button type="button" [routerLink]="['/course-status', courseStatusRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span ceetTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
