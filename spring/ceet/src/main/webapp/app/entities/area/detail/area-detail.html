<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (area(); as areaRef) {
      <div>
        <h2 data-cy="areaDetailsHeading"><span ceetTranslate="ceetApp.area.detail.title">Area</span></h2>

        <hr />

        <ceet-alert-error />

        <ceet-alert />

        <dl class="row-md jh-entity-details">
          <dt><span ceetTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ areaRef.id }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.area.areaName">Area Name</span></dt>
          <dd>
            <span>{{ areaRef.areaName }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.area.urlLogo">Url Logo</span></dt>
          <dd>
            <span>{{ areaRef.urlLogo }}</span>
          </dd>
          <dt><span ceetTranslate="ceetApp.area.areaState">Area State</span></dt>
          <dd>
            <span [ceetTranslate]="'ceetApp.State.' + (areaRef.areaState ?? 'null')">{{
              { null: '', ACTIVE: 'Activo', INACTIVE: 'Inactivo' }[areaRef.areaState ?? 'null']
            }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span ceetTranslate="entity.action.back">Volver</span>
        </button>

        <button type="button" [routerLink]="['/area', areaRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span ceetTranslate="entity.action.edit">Editar</span>
        </button>
      </div>
    }
  </div>
</div>
